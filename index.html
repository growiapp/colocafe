<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Colo Café</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#FDF6EE; --surf:#FFFFFF; --surf2:#F5EDE0; --surf3:#EDE3D4;
  --ink:#1C1501; --ink2:#6B5F4A; --ink3:#B0A590;
  --orange:#C94A1A; --orange-bg:#FEF0EA; --orange-mid:#E8703A;
  --green:#1A7A4A; --green-bg:#EAF7F0;
  --red:#B03030; --red-bg:#FDEAEA;
  --amber:#8A5A00; --amber-bg:#FFF5DC;
  --blue:#185FA5; --blue-bg:#EAF0FA;
  --border:rgba(28,21,1,.09); --border2:rgba(28,21,1,.16);
  --r:14px; --r-sm:8px; --r-xs:6px;
  --ff-serif:'Fraunces',Georgia,serif; --ff:'DM Sans',sans-serif;
  --nav-h:60px; --header-h:58px;
}
body{font-family:var(--ff);background:var(--bg);color:var(--ink);font-size:14px;min-height:100vh}

/* ── HEADER ── */
.header{position:fixed;top:0;left:0;right:0;z-index:200;height:var(--header-h);background:var(--surf);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;gap:12px}
.header-left{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-svg{flex-shrink:0}
.header-right{display:flex;align-items:center;gap:8px;min-width:0}
.header-date{font-size:11px;color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gs-pill{display:flex;align-items:center;gap:5px;padding:4px 9px;border-radius:20px;border:1px solid var(--border);background:var(--surf2);font-size:11px;color:var(--ink3);flex-shrink:0;cursor:default}
.gs-dot{width:6px;height:6px;border-radius:50%;background:var(--ink3);transition:background .3s;flex-shrink:0}
.gs-dot.on{background:var(--green)}
.turno-pill{display:flex;align-items:center;gap:5px;padding:4px 9px;border-radius:20px;border:1px solid var(--border);background:var(--surf2);font-size:11px;color:var(--ink3);flex-shrink:0;cursor:pointer;transition:background .15s}
.turno-pill:hover{background:var(--surf3)}
.turno-pill.abierto{background:var(--green-bg);border-color:rgba(26,122,74,.2);color:var(--green)}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:200;height:var(--nav-h);background:var(--surf);border-top:1px solid var(--border);display:flex;align-items:stretch;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;cursor:pointer;font-family:var(--ff);font-size:10px;font-weight:500;color:var(--ink3);transition:color .15s;padding:6px 4px}
.nav-btn.active{color:var(--orange)}
.nav-icon{font-size:20px;line-height:1}

/* ── PAGE WRAPPER ── */
.page-wrap{padding-top:var(--header-h);padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom));min-height:100vh}

/* ── TABS ── */
.tab{display:none}.tab.active{display:block}

/* ── SUBTABS ── */
.subtab-bar{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--surf);position:sticky;top:var(--header-h);z-index:100}
.subtab-btn{flex:1;padding:10px 8px;font-family:var(--ff);font-size:12px;font-weight:500;color:var(--ink3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s}
.subtab-btn.active{color:var(--orange);border-bottom-color:var(--orange)}

/* ── DESKTOP LAYOUTS ── */
@media(min-width:768px){
  .carga-layout{display:grid;grid-template-columns:1fr 320px;gap:20px;align-items:start;max-width:1200px;margin:0 auto;padding:20px 24px}
  .carga-left{min-width:0}
  .carga-right{position:sticky;top:calc(var(--header-h)+16px)}
  .inv-layout,.dash-layout,.hist-layout,.adj-layout{max-width:1200px;margin:0 auto;padding:20px 24px}
  .dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .dash-grid .chart-card:first-child{grid-column:1/-1}
  .header{padding:0 24px}
  .header-date{font-size:12px}
}
@media(max-width:767px){
  .carga-layout{padding:12px}
  .carga-right{display:block}
  .inv-layout,.dash-layout,.hist-layout,.adj-layout{padding:12px}
  .dash-grid{display:block}
}

/* ── SECTION UTILS ── */
.sect{font-size:10px;font-weight:500;color:var(--ink3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}

/* ── CAT CHIPS ── */
.cat-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
@media(max-width:767px){.cat-chips{flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}.cat-chips::-webkit-scrollbar{display:none}}
.chip{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border2);background:var(--surf);color:var(--ink2);cursor:pointer;transition:all .15s;user-select:none;white-space:nowrap;flex-shrink:0}
.chip.active{background:var(--orange);color:#fff;border-color:var(--orange)}
.chip-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;vertical-align:middle}

/* ── PRODUCT GRID ── */
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(138px,1fr));gap:8px;margin-bottom:14px}
.prod-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:12px;cursor:pointer;transition:all .12s;position:relative;user-select:none}
.prod-card:active{transform:scale(.96)}
.prod-card.in-cart{border-color:var(--orange);border-width:1.5px}
.prod-card.disabled{opacity:.38;pointer-events:none}
.prod-card.low-stock{border-color:var(--amber)}
.cat-dot{width:6px;height:6px;border-radius:50%;margin-bottom:8px}
.prod-name{font-size:13px;font-weight:500;color:var(--ink);line-height:1.3;margin-bottom:3px}
.prod-price{font-size:12px;color:var(--ink2)}
.prod-mods-hint{font-size:10px;color:var(--ink3);margin-top:3px}
.prod-low-txt{font-size:10px;color:var(--amber);font-weight:500;margin-top:3px}
.prod-badge{position:absolute;top:8px;right:8px;background:var(--orange);color:#fff;border-radius:50%;width:20px;height:20px;font-size:11px;font-weight:500;display:flex;align-items:center;justify-content:center}
.out-lbl{position:absolute;top:8px;right:8px;background:var(--red-bg);color:var(--red);border-radius:4px;padding:2px 5px;font-size:9px;font-weight:500}

/* ── CARRITO ── */
.carrito-wrap{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:16px}
@media(max-width:767px){.carrito-wrap{margin-bottom:14px}}
.cart-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.cart-title{font-size:14px;font-weight:500}
.cart-total{font-size:16px;font-weight:500;color:var(--orange)}
.cart-empty{text-align:center;padding:28px 0;color:var(--ink3);font-size:13px}
.cart-rows{display:flex;flex-direction:column;gap:8px;margin:12px 0}
.cart-row{display:flex;align-items:flex-start;gap:8px}
.c-name-wrap{flex:1;min-width:0}
.c-name{font-size:13px;line-height:1.3}
.c-mods{font-size:11px;color:var(--ink3);margin-top:2px}
.c-nota{font-size:11px;color:var(--blue);margin-top:2px;font-style:italic}
.qty-wrap{display:flex;align-items:center;gap:5px;flex-shrink:0}
.qty-btn{width:26px;height:26px;border-radius:50%;border:1px solid var(--border2);background:var(--surf2);color:var(--ink);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;user-select:none;flex-shrink:0}
.qty-n{font-size:13px;font-weight:500;min-width:16px;text-align:center}
.c-sub{font-size:12px;color:var(--ink2);min-width:64px;text-align:right;flex-shrink:0}
.divider{height:1px;background:var(--border);margin:10px 0}
.pago-lbl{font-size:11px;color:var(--ink3);margin-bottom:7px}
.pago-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.pago-opt{padding:8px;border:1px solid var(--border2);border-radius:var(--r-sm);background:var(--surf2);font-size:12px;font-weight:500;color:var(--ink2);cursor:pointer;text-align:center;transition:all .15s;user-select:none}
.pago-opt.active{background:var(--orange);color:#fff;border-color:var(--orange)}
.btn-confirmar{width:100%;padding:12px;background:var(--orange);color:#fff;border:none;border-radius:var(--r-sm);font-family:var(--ff);font-size:14px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-confirmar:active{transform:scale(.98);opacity:.9}
.btn-confirmar:disabled{opacity:.35;cursor:default}

/* ── ALERT BANNERS ── */
.alert-banner{background:var(--amber-bg);border:1px solid rgba(138,90,0,.2);border-radius:var(--r-sm);padding:10px 14px;margin-bottom:10px;font-size:12px;color:var(--amber);line-height:1.5}
.alert-banner.crit{background:var(--red-bg);border-color:rgba(176,48,48,.2);color:var(--red)}
.setup-banner{background:var(--amber-bg);border:1px solid rgba(138,90,0,.2);border-radius:var(--r-sm);padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--amber);cursor:pointer;display:flex;align-items:center;gap:8px}

/* ── KPI GRID ── */
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
@media(min-width:600px){.kpi-grid{grid-template-columns:repeat(4,1fr)}}
.kpi{background:var(--surf2);border-radius:var(--r-sm);padding:12px 14px}
.kpi-lbl{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.kpi-val{font-size:22px;font-weight:500;color:var(--ink);line-height:1;margin-bottom:2px}
.kpi-sub{font-size:11px;color:var(--ink3)}
.kpi-up{color:var(--green)}.kpi-dn{color:var(--red)}

/* ── CHART CARD ── */
.chart-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:14px}
.chart-ttl{font-size:13px;font-weight:500;margin-bottom:14px}
.bar-chart{display:flex;align-items:flex-end;gap:5px;height:90px;margin-bottom:4px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%;justify-content:flex-end}
.bar-fill{width:100%;border-radius:3px 3px 0 0;background:var(--surf2);transition:height .4s}
.bar-fill.today{background:var(--orange)}.bar-fill.hi{background:var(--orange-mid)}
.bar-lbl{font-size:10px;color:var(--ink3)}
.bar-monto{font-size:9px;color:var(--ink3);text-align:center;line-height:1}
.top-list{display:flex;flex-direction:column;gap:10px}
.top-row{display:flex;align-items:center;gap:10px}
.top-rank{font-size:11px;color:var(--ink3);width:14px;flex-shrink:0}
.top-name{flex:1;font-size:13px}
.top-bar-bg{width:72px;height:5px;background:var(--surf2);border-radius:3px;overflow:hidden}
.top-bar-fill{height:100%;border-radius:3px;background:var(--orange)}
.top-cnt{font-size:12px;color:var(--ink2);min-width:38px;text-align:right}
.split-track{height:7px;border-radius:4px;background:var(--surf2);overflow:hidden;display:flex;margin-bottom:10px}
.split-ef{background:var(--orange)}.split-mp{background:var(--orange-mid)}
.split-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.split-stat{text-align:center;padding:10px;background:var(--surf2);border-radius:var(--r-sm)}
.split-lbl{font-size:10px;color:var(--ink3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em}
.split-pct{font-size:18px;font-weight:500;color:var(--ink)}
.split-monto{font-size:11px;color:var(--ink3);margin-top:1px}
.sdot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle}
.cat-rev-list{display:flex;flex-direction:column;gap:10px}
.cat-rev-row{display:flex;align-items:center;gap:10px}
.cdot2{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cat-rev-name{flex:1;font-size:13px}
.cat-bar-bg{width:80px;height:5px;background:var(--surf2);border-radius:3px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:3px}
.cat-rev-monto{font-size:12px;color:var(--ink2);min-width:58px;text-align:right}

/* ── INGENIERÍA DE MENÚ ── */
.menu-eng-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.menu-eng-quad{border-radius:var(--r-sm);padding:12px;border:1px solid var(--border)}
.quad-titulo{font-size:11px;font-weight:500;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.quad-item{font-size:12px;color:var(--ink2);padding:3px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
.quad-item:last-child{border-bottom:none}
.quad-item span{font-size:11px;color:var(--ink3)}

/* ── SECCIÓN SPLIT ── */
.seccion-split{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.seccion-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px}
.seccion-lbl{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.seccion-val{font-size:20px;font-weight:500;color:var(--ink)}
.seccion-sub{font-size:11px;color:var(--ink3);margin-top:2px}

/* ── HISTORIAL ── */
.hist-item{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.hist-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;cursor:pointer;user-select:none}
.hist-fecha{font-size:13px;font-weight:500}
.hist-meta{font-size:11px;color:var(--ink3);margin-top:2px}
.hist-right{display:flex;align-items:center;gap:4px}
.hist-total{font-size:14px;font-weight:500}
.hist-arr{font-size:12px;color:var(--ink3);transition:transform .2s;display:inline-block}
.hist-arr.open{transform:rotate(180deg)}
.hist-detail{border-top:1px solid var(--border);padding:10px 14px;display:none}
.hist-detail.open{display:block}
.hist-row2{display:flex;justify-content:space-between;font-size:12px;color:var(--ink2);padding:3px 0}
.hist-row2 span:last-child{color:var(--ink);font-weight:500}

/* ── INVENTARIO / INSUMOS ── */
.inv-toolbar{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.inv-search{flex:1;min-width:140px;padding:8px 12px;border:1px solid var(--border2);border-radius:var(--r-sm);background:var(--surf);font-family:var(--ff);font-size:13px;color:var(--ink);outline:none}
.inv-search:focus{border-color:var(--orange)}
.btn-sm{padding:7px 14px;border:1px solid var(--border2);border-radius:var(--r-sm);background:var(--surf);font-family:var(--ff);font-size:12px;font-weight:500;color:var(--ink);cursor:pointer;transition:all .15s;white-space:nowrap;user-select:none}
.btn-sm:hover{background:var(--surf2)}
.btn-sm.primary{background:var(--orange);color:#fff;border-color:var(--orange)}
.btn-sm.primary:hover{opacity:.9}
.inv-table{display:flex;flex-direction:column;gap:5px}
.inv-row{background:var(--surf);border:1px solid var(--border);border-radius:var(--r-sm);display:grid;align-items:center;padding:10px 14px;gap:10px;grid-template-columns:1fr 70px 130px 28px}
@media(max-width:600px){.inv-row{grid-template-columns:1fr 90px 28px;grid-template-rows:auto auto}.inv-status{display:none}}
.inv-row.low{border-color:var(--amber);background:var(--amber-bg)}
.inv-row.out{border-color:var(--red);background:var(--red-bg)}
.inv-name{font-size:13px;font-weight:500;display:flex;align-items:center;gap:7px;min-width:0}
.inv-name span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.inv-cat-tag{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;background:var(--surf2);color:var(--ink3);flex-shrink:0;white-space:nowrap}
.inv-status{font-size:11px;font-weight:500;text-align:center}
.inv-status.ok{color:var(--green)}.inv-status.low{color:var(--amber)}.inv-status.out{color:var(--red)}
.stock-ctrl{display:flex;align-items:center;gap:5px}
.stock-num{width:46px;text-align:center;padding:5px 4px;border:1px solid var(--border2);border-radius:var(--r-xs);font-family:var(--ff);font-size:13px;font-weight:500;color:var(--ink);background:var(--surf);outline:none}
.stock-num:focus{border-color:var(--orange)}
.icon-btn{width:28px;height:28px;border-radius:var(--r-xs);border:1px solid var(--border2);background:var(--surf2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.icon-btn:hover{background:var(--orange);border-color:var(--orange)}
.icon-btn:hover svg{stroke:#fff}
.icon-btn svg{width:13px;height:13px;stroke:var(--ink2);transition:stroke .15s}

/* ── MERMAS ── */
.merma-row{background:var(--surf);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 14px;margin-bottom:6px;display:flex;gap:10px;align-items:center}
.merma-info{flex:1;min-width:0}
.merma-nombre{font-size:13px;font-weight:500}
.merma-meta{font-size:11px;color:var(--ink3);margin-top:2px}
.merma-cant{font-size:13px;color:var(--red);font-weight:500;flex-shrink:0}

/* ── AJUSTES ── */
.cfg-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.cfg-title{font-size:13px;font-weight:500;margin-bottom:12px}
.cfg-field{margin-bottom:12px}
.cfg-lbl{font-size:11px;color:var(--ink3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;display:block}
.cfg-input{width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--r-sm);background:var(--surf2);font-family:var(--ff);font-size:13px;color:var(--ink);outline:none}
.cfg-input:focus{border-color:var(--orange)}
.btn-cfg{width:100%;padding:10px;background:var(--orange);color:#fff;border:none;border-radius:var(--r-sm);font-family:var(--ff);font-size:13px;font-weight:500;cursor:pointer}
.cat-mgr{display:flex;flex-direction:column;gap:6px}
.cat-mgr-row{background:var(--surf);border:1px solid var(--border);border-radius:var(--r-sm);display:flex;align-items:center;padding:10px 12px;gap:10px}
.cat-swatch{width:14px;height:14px;border-radius:50%;flex-shrink:0;cursor:pointer;border:1px solid rgba(0,0,0,.1)}
.cat-name-in{flex:1;font-size:13px;font-weight:500;background:transparent;border:none;outline:none;color:var(--ink);font-family:var(--ff)}
.cat-seccion-sel{font-size:11px;padding:3px 7px;border:1px solid var(--border2);border-radius:var(--r-xs);background:var(--surf2);font-family:var(--ff);color:var(--ink2);outline:none;cursor:pointer}
.cat-del{width:26px;height:26px;border-radius:var(--r-xs);border:1px solid var(--border2);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink3);font-size:16px;transition:all .15s;flex-shrink:0}
.cat-del:hover{background:var(--red-bg);color:var(--red);border-color:rgba(176,48,48,.3)}
.color-picker-wrap{display:none;padding:8px 12px 10px;background:var(--surf2);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r-sm) var(--r-sm);margin-top:-6px}
.color-picker-wrap.open{display:block}
.color-dots{display:flex;gap:6px;flex-wrap:wrap}
.cdot{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .1s}
.cdot.sel{border-color:var(--ink)}
.menu-adm-row{background:var(--surf);border:1px solid var(--border);border-radius:var(--r-xs);display:flex;align-items:center;padding:9px 12px;margin-bottom:5px;gap:10px}

/* ── MODIFICADORES ── */
.mod-grupo{background:var(--surf2);border-radius:var(--r-sm);padding:10px 12px;margin-bottom:8px}
.mod-grupo-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px}
.mod-grupo-nombre{font-size:12px;font-weight:500;flex:1}
.mod-tipo-badge{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--surf);border:1px solid var(--border2);color:var(--ink3)}
.mod-opcion-row{display:flex;gap:6px;align-items:center;margin-bottom:5px}
.mod-opcion-row input[type=text]{flex:1;padding:5px 8px;border:1px solid var(--border2);border-radius:var(--r-xs);font-family:var(--ff);font-size:12px;background:var(--surf);color:var(--ink);outline:none}
.mod-opcion-row input[type=number]{width:80px;padding:5px 8px;border:1px solid var(--border2);border-radius:var(--r-xs);font-family:var(--ff);font-size:12px;background:var(--surf);color:var(--ink);outline:none}
.mod-opcion-row .qty-btn{width:22px;height:22px;font-size:14px;flex-shrink:0}

/* ── RECETAS ── */
.receta-row{display:flex;gap:8px;align-items:center;margin-bottom:6px}
.receta-row select,.receta-row input{padding:6px 10px;border:1px solid var(--border2);border-radius:var(--r-xs);font-family:var(--ff);font-size:12px;background:var(--surf);color:var(--ink);outline:none}
.receta-row select{flex:1}
.receta-row input{width:80px}
.receta-unidad{font-size:11px;color:var(--ink3);white-space:nowrap}

/* ── CLIENTES CRM ── */
.cliente-row{background:var(--surf);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 14px;margin-bottom:6px;cursor:pointer;transition:background .12s}
.cliente-row:hover{background:var(--surf2)}
.cliente-nombre{font-size:13px;font-weight:500}
.cliente-meta{font-size:11px;color:var(--ink3);margin-top:3px}
.cliente-visitas{font-size:11px;color:var(--orange);font-weight:500}

/* ── RESERVAS ── */
.reserva-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 14px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start}
.reserva-hora-blk{text-align:center;flex-shrink:0;width:48px}
.reserva-hora{font-size:15px;font-weight:500;color:var(--ink)}
.reserva-personas{font-size:11px;color:var(--ink3)}
.reserva-info{flex:1;min-width:0}
.reserva-cliente{font-size:13px;font-weight:500}
.reserva-nota{font-size:12px;color:var(--ink2);margin-top:2px}
.reserva-estado{font-size:10px;font-weight:500;padding:3px 8px;border-radius:20px;flex-shrink:0}
.reserva-estado.confirmada{background:var(--green-bg);color:var(--green)}
.reserva-estado.pendiente{background:var(--amber-bg);color:var(--amber)}
.reserva-estado.cancelada{background:var(--red-bg);color:var(--red)}
.reserva-actions{display:flex;gap:6px;margin-top:8px}

/* ── MESAS GRID ── */
.mesas-grupo{margin-bottom:18px}
.mesas-grupo-titulo{font-size:10px;font-weight:500;color:var(--ink3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.mesas-grupo-titulo::after{content:'';flex:1;height:1px;background:var(--border)}
.mesas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:8px}
.mesa-card{background:var(--surf);border:1.5px solid var(--border2);border-radius:var(--r);padding:14px;cursor:pointer;transition:all .12s;position:relative}
.mesa-card:active{transform:scale(.97)}
.mesa-tipo-badge{display:inline-block;font-size:9px;font-weight:500;padding:2px 7px;border-radius:20px;margin-bottom:6px}
.mesa-tipo-salon{background:var(--blue-bg);color:var(--blue)}
.mesa-tipo-delivery{background:var(--amber-bg);color:var(--amber)}
.mesa-tipo-takeaway{background:var(--green-bg);color:var(--green)}
.mesa-nombre{font-family:var(--ff-serif);font-size:15px;color:var(--ink);margin-bottom:4px}
.mesa-items{font-size:12px;color:var(--ink3);margin-bottom:6px}
.mesa-total{font-size:14px;font-weight:500;color:var(--orange)}
.mesa-close{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:50%;border:1px solid var(--border2);background:var(--surf2);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--ink3);cursor:pointer;transition:all .12s}
.mesa-close:hover{background:var(--red-bg);color:var(--red);border-color:rgba(176,48,48,.3)}
.tipo-btns{display:flex;gap:6px;margin-bottom:14px;justify-content:center}
.tipo-btn{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:500;border:1.5px solid var(--border2);background:var(--surf);cursor:pointer;transition:all .15s;user-select:none}
.tipo-btn.sel-salon{background:var(--blue-bg);border-color:var(--blue);color:var(--blue)}
.tipo-btn.sel-delivery{background:var(--amber-bg);border-color:var(--amber);color:var(--amber)}
.tipo-btn.sel-takeaway{background:var(--green-bg);border-color:var(--green);color:var(--green)}

/* ── TURNO MODAL ── */
.turno-resumen-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.turno-stat{background:var(--surf2);border-radius:var(--r-sm);padding:10px 12px;text-align:center}
.turno-stat-lbl{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.turno-stat-val{font-size:16px;font-weight:500;color:var(--ink)}

/* ── MODAL (generic) ── */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(28,21,1,.5);z-index:500;align-items:center;justify-content:center;padding:16px}
.modal-ov.open{display:flex}
.modal-box{background:var(--surf);border-radius:var(--r);width:100%;max-width:480px;padding:24px;animation:popIn .2s ease;max-height:90vh;overflow-y:auto}
@keyframes popIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
.modal-title{font-family:var(--ff-serif);font-size:18px;margin-bottom:18px}
.modal-field{margin-bottom:14px}
.modal-lbl{font-size:11px;color:var(--ink3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;display:block}
.modal-input{width:100%;padding:10px 12px;border:1px solid var(--border2);border-radius:var(--r-sm);background:var(--surf2);font-family:var(--ff);font-size:14px;color:var(--ink);outline:none}
.modal-input:focus{border-color:var(--orange)}
.modal-select{width:100%;padding:10px 12px;border:1px solid var(--border2);border-radius:var(--r-sm);background:var(--surf2);font-family:var(--ff);font-size:14px;color:var(--ink);outline:none;-webkit-appearance:none;appearance:none}
.modal-textarea{width:100%;padding:10px 12px;border:1px solid var(--border2);border-radius:var(--r-sm);background:var(--surf2);font-family:var(--ff);font-size:13px;color:var(--ink);outline:none;resize:vertical;min-height:70px}
.modal-textarea:focus{border-color:var(--orange)}
.modal-2col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
.btn-cancel{padding:11px;border:1px solid var(--border2);border-radius:var(--r-sm);background:var(--surf2);font-family:var(--ff);font-size:14px;color:var(--ink2);cursor:pointer}
.btn-save{padding:11px;background:var(--orange);color:#fff;border:none;border-radius:var(--r-sm);font-family:var(--ff);font-size:14px;font-weight:500;cursor:pointer}
.modal-close{position:absolute;top:16px;right:16px;width:28px;height:28px;border:1px solid var(--border2);border-radius:var(--r-xs);background:var(--surf2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--ink3)}
.modal-box{position:relative}

/* ── MODS SELECTOR (en carrito) ── */
.mod-sel-grupo{margin-bottom:14px}
.mod-sel-titulo{font-size:12px;font-weight:500;color:var(--ink);margin-bottom:8px}
.mod-sel-opciones{display:flex;flex-direction:column;gap:6px}
.mod-sel-opt{display:flex;align-items:center;gap:10px;padding:8px 12px;border:1px solid var(--border2);border-radius:var(--r-sm);cursor:pointer;transition:all .12s;background:var(--surf2)}
.mod-sel-opt.sel{border-color:var(--orange);background:var(--orange-bg)}
.mod-sel-opt-nombre{flex:1;font-size:13px}
.mod-sel-opt-precio{font-size:12px;color:var(--ink3)}
.mod-sel-opt.sel .mod-sel-opt-precio{color:var(--orange)}

/* ── NOTA INPUT ── */
.nota-input{width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--r-xs);font-family:var(--ff);font-size:12px;color:var(--ink);background:var(--surf2);outline:none;margin-top:8px}
.nota-input:focus{border-color:var(--blue)}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(var(--nav-h) + 12px);left:50%;transform:translateX(-50%) translateY(10px);background:var(--ink);color:var(--bg);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:all .25s;pointer-events:none;z-index:600;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── MISC ── */
.empty{text-align:center;padding:40px 20px;color:var(--ink3);font-size:13px}
.guide-steps{display:flex;flex-direction:column;gap:10px}
.guide-step{display:flex;gap:12px;align-items:flex-start}
.guide-num{width:22px;height:22px;border-radius:50%;background:var(--orange);color:#fff;font-size:11px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.guide-txt{font-size:13px;color:var(--ink2);line-height:1.5}
.guide-txt code{background:var(--surf2);padding:1px 5px;border-radius:4px;font-size:11px;color:var(--ink)}

/* ── ACCORDION ── */
.accordion-item{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.accordion-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer;user-select:none;transition:background .12s}
.accordion-hdr:hover{background:var(--surf2)}
.accordion-titulo{font-size:13px;font-weight:500;color:var(--ink)}
.accordion-meta{font-size:11px;color:var(--ink3);margin-top:2px}
.accordion-arr{font-size:12px;color:var(--ink3);transition:transform .2s}
.accordion-arr.open{transform:rotate(180deg)}
.accordion-body{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}
.accordion-body.open{display:block}

/* ── TABS INTERNAS (Ajustes Menú) ── */
.inner-tab-bar{display:flex;gap:0;margin-bottom:14px;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.inner-tab-bar::-webkit-scrollbar{display:none}
.inner-tab-btn{padding:9px 14px;font-family:var(--ff);font-size:12px;font-weight:500;color:var(--ink3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.inner-tab-btn.active{color:var(--orange);border-bottom-color:var(--orange)}

/* ── MODAL CONFIRM ── */
.modal-confirm-icon{font-size:32px;text-align:center;margin-bottom:10px}
.modal-confirm-msg{font-size:14px;color:var(--ink2);text-align:center;line-height:1.5;margin-bottom:20px}

/* ── MESAS: color borde por estado ── */
.mesa-card.con-items{border-color:var(--orange)}
.mesa-card.sin-items{border-color:var(--border2)}

/* ── RESERVAS: color borde por estado ── */
.reserva-card.pendiente{border-color:var(--amber)}
.reserva-card.confirmada{border-color:var(--green)}
.reserva-card.pagada{border-color:var(--blue)}
.reserva-card.cancelada{border-color:var(--border2);opacity:.7}

/* ── TURNO PILL actualizada ── */
.turno-pill{display:flex;align-items:center;gap:6px;padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:var(--surf2);font-size:11px;color:var(--ink3);flex-shrink:0;cursor:pointer;transition:all .15s;font-family:var(--ff)}
.turno-pill:hover{background:var(--surf3)}
.turno-pill.abierto{background:var(--green-bg);border-color:rgba(26,122,74,.25);color:var(--green)}
.turno-dot{width:7px;height:7px;border-radius:50%;background:var(--ink3);flex-shrink:0}
.turno-dot.on{background:var(--green)}

/* ── MODIFICADORES admin ── */
.mod-grupo-admin{background:var(--surf2);border-radius:var(--r-sm);padding:12px;margin-bottom:10px}
.mod-grupo-admin-hdr{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.mod-grupo-tipo{font-size:11px;padding:3px 8px;border-radius:20px;background:var(--surf);border:1px solid var(--border2);color:var(--ink3);flex-shrink:0}
.mod-opcion-admin{display:flex;gap:6px;align-items:center;margin-bottom:6px;padding:6px 8px;background:var(--surf);border-radius:var(--r-xs)}
.mod-opcion-admin input{padding:4px 8px;border:1px solid var(--border2);border-radius:var(--r-xs);font-family:var(--ff);font-size:12px;background:var(--surf);color:var(--ink);outline:none}
.mod-opcion-admin input:focus{border-color:var(--orange)}
.mod-opcion-nombre{flex:1}
.mod-opcion-precio{width:90px}

/* ── RESERVAS nueva estructura ── */
.reserva-prod{font-size:12px;color:var(--blue);margin-top:3px;font-weight:500}
.reserva-porciones{font-size:11px;color:var(--ink3)}

/* ── CLIENTES TAB ── */
.cliente-search-bar{padding:12px;position:sticky;top:calc(var(--header-h));background:var(--bg);z-index:50;border-bottom:1px solid var(--border)}
.clientes-lista{padding:12px;max-width:900px;margin:0 auto}

</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <img src="logo.svg" style="width:44px;height:44px;flex-shrink:0;" alt="Colo Café">
  </div>
  <div class="header-right">
    <span class="header-date" id="hoy-lbl"></span>
    <div class="turno-pill" id="turno-pill" onclick="openTurnoModal()">
      <span class="turno-dot" id="turno-dot"></span>Sin turno
    </div>
    <div class="gs-pill" id="gs-pill">
      <div class="gs-dot" id="gs-dot"></div>
      <span id="gs-txt">Sin conexión</span>
    </div>
  </div>
</div>

<!-- PAGE WRAP -->
<div class="page-wrap">

<!-- TAB: VENTAS / MESAS -->
<div class="tab active" id="tab-carga">
  <div class="subtab-bar">
    <button class="subtab-btn active" id="stab-mesas" onclick="switchSubtab('mesas')">Mesas</button>
    <button class="subtab-btn" id="stab-reservas" onclick="switchSubtab('reservas')">Reservas</button>
  </div>
  <!-- Mesas -->
  <div id="subtab-mesas">
    <div id="view-mesas">
      <div style="max-width:1200px;margin:0 auto;padding:12px">
        <div id="setup-banner"></div>
        <div id="stock-alerts"></div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
          <div style="font-family:var(--ff-serif);font-size:16px;color:var(--ink)">Mesas abiertas</div>
          <button class="btn-sm primary" onclick="abrirNuevaMesa()">+ Nueva mesa</button>
        </div>
        <div id="mesas-container"></div>
        <div id="mesas-empty" class="empty" style="display:none">No hay mesas abiertas</div>
      </div>
    </div>
    <div id="view-pedido" style="display:none">
      <div class="carga-layout">
        <div class="carga-left">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
            <button class="btn-sm" onclick="volverAMesas()">← Mesas</button>
            <div style="font-family:var(--ff-serif);font-size:16px;color:var(--ink)" id="mesa-titulo"></div>
            <div id="mesa-tipo-badge" class="mesa-tipo-badge"></div>
          </div>
          <div class="cat-chips" id="carga-cats"></div>
          <div class="prod-grid" id="prod-grid"></div>
        </div>
        <div class="carga-right">
          <div class="carrito-wrap">
            <div class="cart-hdr">
              <span class="cart-title">Pedido</span>
              <span class="cart-total" id="cart-total">$0</span>
            </div>
            <div class="cart-empty" id="cart-empty">El carrito está vacío</div>
            <div class="cart-rows" id="cart-rows" style="display:none"></div>
            <div class="divider"></div>
            <div class="pago-lbl">Forma de pago</div>
            <div class="pago-grid">
              <div class="pago-opt active" id="popt-ef" onclick="setPago('ef')">Efectivo</div>
              <div class="pago-opt" id="popt-mp" onclick="setPago('mp')">Mercado Pago</div>
            </div>
            <button class="btn-confirmar" id="btn-confirm" onclick="cerrarMesa()">Cerrar y cobrar</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- Reservas de productos -->
  <div id="subtab-reservas" style="display:none">
    <div style="max-width:900px;margin:0 auto;padding:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">
        <div style="font-family:var(--ff-serif);font-size:16px;color:var(--ink)">Reservas</div>
        <button class="btn-sm primary" onclick="openReservaModal(null)">+ Nueva reserva</button>
      </div>
      <div class="cat-chips" id="reserva-filtro-chips"></div>
      <div id="reservas-lista"></div>
    </div>
  </div>
</div>

<!-- TAB: INSUMOS -->
<div class="tab" id="tab-inventario">
  <div class="subtab-bar">
    <button class="subtab-btn active" id="stab-insumos" onclick="switchInvSubtab('insumos')">Insumos</button>
    <button class="subtab-btn" id="stab-mermas" onclick="switchInvSubtab('mermas')">Mermas</button>
  </div>
  <div id="inv-subtab-insumos">
    <div class="inv-layout">
      <div class="inv-toolbar">
        <input class="inv-search" id="inv-search" type="search" placeholder="Buscar insumo…" oninput="renderInv()">
        <button class="btn-sm primary" onclick="openInsumoModal(null)">+ Insumo</button>
      </div>
      <div id="inv-alerts"></div>
      <div class="inv-table" id="inv-table"></div>
    </div>
  </div>
  <div id="inv-subtab-mermas" style="display:none">
    <div class="inv-layout">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="font-size:13px;color:var(--ink2)">Registro de pérdidas</div>
        <button class="btn-sm primary" onclick="openMermaModal()">+ Merma</button>
      </div>
      <div id="mermas-lista"></div>
    </div>
  </div>
</div>

<!-- TAB: DASHBOARD -->
<div class="tab" id="tab-dashboard">
  <div class="dash-layout">
    <div class="kpi-grid" id="kpi-grid"></div>
    <div class="seccion-split" id="seccion-split"></div>
    <div class="dash-grid">
      <div class="chart-card">
        <div class="chart-ttl">Ventas — últimos 7 días</div>
        <div class="bar-chart" id="bar-semana"></div>
      </div>
      <div class="chart-card">
        <div class="chart-ttl">Top productos hoy</div>
        <div class="top-list" id="top-list"></div>
      </div>
      <div class="chart-card">
        <div class="chart-ttl">Efectivo vs Mercado Pago</div>
        <div class="split-track" id="split-track"></div>
        <div class="split-stats" id="split-stats"></div>
      </div>
      <div class="chart-card">
        <div class="chart-ttl">Ventas por categoría</div>
        <div class="cat-rev-list" id="cat-rev"></div>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-ttl">Ingeniería de menú</div>
      <div style="font-size:11px;color:var(--ink3);margin-bottom:10px">Últimos 30 días · ventas reales vs costo de receta</div>
      <div class="menu-eng-grid" id="menu-eng-grid"></div>
    </div>
  </div>
</div>

<!-- TAB: CLIENTES -->
<div class="tab" id="tab-clientes">
  <div class="cliente-search-bar">
    <div style="max-width:900px;margin:0 auto;display:flex;gap:8px">
      <input class="inv-search" style="flex:1" id="cliente-search" type="search" placeholder="Buscar por nombre, teléfono…" oninput="renderClientesTab()">
      <button class="btn-sm primary" onclick="openClienteModal(null)">+ Cliente</button>
    </div>
  </div>
  <div class="clientes-lista" id="clientes-lista-tab"></div>
</div>

<!-- TAB: HISTORIAL -->
<div class="tab" id="tab-historial">
  <div class="hist-layout">
    <div id="hist-list"></div>
  </div>
</div>

<!-- TAB: AJUSTES -->
<div class="tab" id="tab-ajustes">
  <div class="adj-layout">

    <!-- ACCORDION: Menú -->
    <div class="accordion-item" id="acc-menu">
      <div class="accordion-hdr" onclick="toggleAccordion('menu')">
        <div>
          <div class="accordion-titulo">Menú</div>
          <div class="accordion-meta" id="acc-menu-meta"></div>
        </div>
        <span class="accordion-arr" id="acc-arr-menu">▾</span>
      </div>
      <div class="accordion-body" id="acc-body-menu">
        <div class="inner-tab-bar">
          <button class="inner-tab-btn active" id="itab-cats" onclick="switchMenuTab('cats')">Categorías</button>
          <button class="inner-tab-btn" id="itab-prods" onclick="switchMenuTab('prods')">Productos</button>

const fmtK = n => n>=1000000?'$'+(n/1000000).toFixed(1).replace('.0','')+'M':n>=1000?'$'+Math.round(n/1000)+'k':fmt(n);

function fmtFull(d){
  const dias=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return `${dias[d.getDay()]} ${d.getDate()} de ${meses[d.getMonth()]} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function fmtShort(d){
  const dias=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const meses=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${dias[d.getDay()]} ${d.getDate()} ${meses[d.getMonth()]}`;
}
function today(){ return new Date().toISOString().split('T')[0]; }
function nowISO(){ return new Date().toISOString(); }
function nowT(){ const n=new Date(); return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`; }
function getCat(id){ return cats.find(c=>c.id===id)||{name:'Sin categoría',color:'#aaa',seccion:'cafeteria'}; }
function getInsumo(id){ return insumos.find(x=>x.id===id); }
function showToast(msg,ms=2200){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),ms); }
function tipoLabel(t){ return t==='salon'?'Salón':t==='delivery'?'Delivery':'Take away'; }
function tipoBadgeClass(t){ return t==='salon'?'mesa-tipo-salon':t==='delivery'?'mesa-tipo-delivery':'mesa-tipo-takeaway'; }
function carritoItemTotal(item){ return (item.precio+(item.mods||[]).reduce((s,m)=>s+m.precio,0))*item.qty; }
function carritoTotal(){ return Object.values(carrito).reduce((s,i)=>s+carritoItemTotal(i),0); }

function confirmarAccion(msg, callbackFn, labelOk='Confirmar', colorOk='var(--red)', icon='⚠️'){
  confirmCallback = callbackFn;
  $('confirm-icon').textContent = icon;
  $('confirm-titulo').textContent = '¿Confirmar?';
  $('confirm-msg').textContent = msg;
  const btn = $('confirm-btn-ok');
  btn.textContent = labelOk;
  btn.style.background = colorOk;
  $('modal-confirm').classList.add('open');
}
function cerrarModalConfirm(){ $('modal-confirm').classList.remove('open'); confirmCallback=null; }
function closeModalConfirm(e){ if(e.target===$('modal-confirm')) cerrarModalConfirm(); }
function ejecutarConfirm(){
  if(typeof confirmCallback === 'string') eval(confirmCallback+'()');
  else if(typeof confirmCallback === 'function') confirmCallback();
  cerrarModalConfirm();
}

function mostrarResumenTurno(){
  $('turno-modal-titulo').textContent='Turno activo';
  const vt=turno.ventasIds?ventas.filter(v=>turno.ventasIds.includes(v.id)):[];
  const ef=vt.filter(v=>v.pago==='ef').reduce((s,v)=>s+v.total,0);
  const mp=vt.filter(v=>v.pago==='mp').reduce((s,v)=>s+v.total,0);
  const tot=ef+mp;
  const cafe=vt.filter(v=>getCat(v.cat).seccion==='cafeteria').reduce((s,v)=>s+v.total,0);
  const cocina=vt.filter(v=>getCat(v.cat).seccion==='cocina').reduce((s,v)=>s+v.total,0);
  const ap=new Date(turno.apertura);
  const porOp={};
  vt.forEach(v=>{if(!porOp[v.operador])porOp[v.operador]=0;porOp[v.operador]+=v.total;});
  $('turno-modal-body').innerHTML=`
    <p style="font-size:12px;color:var(--ink3);margin-bottom:14px">
      Abierto: ${fmtFull(ap)}<br>Operador: <strong>${turno.operador}</strong>
    </p>
    <div class="turno-resumen-grid">
      <div class="turno-stat"><div class="turno-stat-lbl">Fondo inicial</div><div class="turno-stat-val">${fmt(turno.fondoCaja)}</div></div>
      <div class="turno-stat"><div class="turno-stat-lbl">Total vendido</div><div class="turno-stat-val" style="color:var(--orange)">${fmt(tot)}</div></div>
      <div class="turno-stat"><div class="turno-stat-lbl">Efectivo</div><div class="turno-stat-val">${fmt(ef)}</div></div>
      <div class="turno-stat"><div class="turno-stat-lbl">Mercado Pago</div><div class="turno-stat-val">${fmt(mp)}</div></div>
      <div class="turno-stat"><div class="turno-stat-lbl">☕ Cafetería</div><div class="turno-stat-val">${fmt(cafe)}</div></div>
      <div class="turno-stat"><div class="turno-stat-lbl">🍳 Cocina</div><div class="turno-stat-val">${fmt(cocina)}</div></div>
    </div>
    ${Object.entries(porOp).length>1?`<div style="margin-bottom:14px;border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden">
      ${Object.entries(porOp).map(([op,t])=>`<div style="display:flex;justify-content:space-between;font-size:12px;padding:8px 12px;border-bottom:1px solid var(--border)"><span>${op}</span><span style="font-weight:500">${fmt(t)}</span></div>`).join('')}
    </div>`:''}
    <div class="modal-actions">
      <button class="btn-cancel" onclick="cerrarModalTurno()">Seguir</button>
      <button class="btn-save" style="background:var(--green)" onclick="pedirCerrarTurno(${ef},${mp},${tot},${cafe},${cocina})">Cerrar turno</button>
    </div>`;
}

function pedirCerrarTurno(ef,mp,tot,cafe,cocina){
  cerrarModalTurno();
  confirmarAccion(`Cerrar turno de ${turno.operador} — total ${fmt(tot)}`,()=>cerrarTurno(ef,mp,tot,cafe,cocina),'Cerrar turno','var(--green)','🏁');
}
async function cerrarTurno(ef,mp,tot,cafe,cocina){
  const resumen={fecha:today(),operador:turno.operador,apertura:turno.apertura,cierre:nowISO(),fondoCaja:turno.fondoCaja,totalEf:ef,totalMp:mp,total:tot,totalCafeteria:cafe,totalCocina:cocina};
  await sheetsPost({action:'addTurno',row:resumen});
  turno=null; save(); renderTurnoPill(); showToast('✓ Turno cerrado');
}

function renderMesas(){
  $('view-mesas').style.display='block'; $('view-pedido').style.display='none';
  mesaActivaId=null; carrito={};
  renderStockAlerts(); renderSetupBanner();
  if(!mesas.length){ $('mesas-container').innerHTML=''; $('mesas-empty').style.display='block'; return; }
  $('mesas-empty').style.display='none';
  const grupos={salon:[],delivery:[],takeaway:[]};
  mesas.forEach(m=>{ const g=m.tipo||'salon'; grupos[g]?grupos[g].push(m):grupos.salon.push(m); });
  let html='';
  ['salon','delivery','takeaway'].forEach(tipo=>{
    const lista=grupos[tipo]; if(!lista.length) return;
    html+=`<div class="mesas-grupo"><div class="mesas-grupo-titulo">${tipoLabel(tipo)}</div><div class="mesas-grid">`;
    lista.forEach(m=>{
      const items=Object.values(m.items||{}).reduce((s,v)=>s+(typeof v==='object'?v.qty:v),0);
      const total=Object.values(m.items||{}).reduce((s,v)=>{
        const q=typeof v==='object'?v.qty:v;
        const base=typeof v==='object'?v.precio:0;
        const mods=typeof v==='object'?(v.mods||[]).reduce((a,b)=>a+b.precio,0):0;
        return s+(base+mods)*q;
      },0);
      const borderClass=items>0?'con-items':'sin-items';
      html+=`<div class="mesa-card ${borderClass}" onclick="abrirMesa('${m.id}')">
        <span class="mesa-tipo-badge ${tipoBadgeClass(tipo)}">${tipoLabel(tipo)}</span>
        <div class="mesa-nombre">${m.nombre}</div>
        <div class="mesa-items">${items} ítem${items!==1?'s':''}</div>
        <div class="mesa-total">${items>0?fmt(total):'—'}</div>
        <div class="mesa-close" onclick="event.stopPropagation();pedirEliminarMesa('${m.id}')" title="Eliminar">×</div>
      </div>`;
    });
    html+='</div></div>';
  });
  $('mesas-container').innerHTML=html;
}

function abrirNuevaMesa(){

  ['salon','delivery','takeaway'].forEach(t=>{ $(`tipo-btn-${t}`).className=`tipo-btn${t===tipoNuevaMesa?' sel-'+t:''}`; });

function cerrarModalNuevaMesa(){ $('modal-nueva-mesa').classList.remove('open'); }
function closeModalNuevaMesa(e){ if(e.target===$('modal-nueva-mesa')) cerrarModalNuevaMesa(); }
function confirmarNuevaMesa(){
  const nombre=$('nueva-mesa-input').value.trim();
  if(!nombre){ showToast('Ingresá un nombre'); return; }
  const m={id:'m_'+Date.now(),nombre,tipo:tipoNuevaMesa,items:{},pago:'ef',apertura:nowISO()};

function pedirEliminarMesa(id){
  const m=mesas.find(x=>x.id===id); if(!m) return;
  confirmarAccion(`¿Eliminar la mesa "${m.nombre}"? Se perderán los ítems.`,()=>{ mesas=mesas.filter(x=>x.id!==id); save(); renderMesas(); showToast('Mesa eliminada'); });
}

function abrirMesa(id){
  const m=mesas.find(x=>x.id===id); if(!m) return;
  mesaActivaId=id; carrito={};
  Object.entries(m.items||{}).forEach(([k,v])=>{ carrito[k]={...v}; });
  pago=m.pago||'ef';
  $('mesa-titulo').textContent=m.nombre;
  const badge=$('mesa-tipo-badge');
  badge.textContent=tipoLabel(m.tipo||'salon'); badge.className=`mesa-tipo-badge ${tipoBadgeClass(m.tipo||'salon')}`;
  $('view-mesas').style.display='none'; $('view-pedido').style.display='block';
  renderCargaCats(); renderProdGrid(); renderCart(); setPago(pago);
}
function volverAMesas(){
  if(mesaActivaId){ const m=mesas.find(x=>x.id===mesaActivaId); if(m){ m.items={...carrito}; m.pago=pago; save(); } }
  renderMesas();
}
function saveMesaCarrito(){
  if(mesaActivaId){ const m=mesas.find(x=>x.id===mesaActivaId); if(m){ m.items={...carrito}; save(); } }
}

async function cerrarMesa(){
  const items=Object.values(carrito);
  if(!items.length){ showToast('El pedido está vacío'); return; }
  const btn=$('btn-confirm'); btn.disabled=true; btn.textContent='Cerrando…';
  const fecha=today(), hora=nowT(), ts=nowISO();
  const m=mesas.find(x=>x.id===mesaActivaId);
  const operador=(turno&&turno.abierto)?turno.operador:'Sin turno';
  const ventaIds=[];
  const nuevas=items.map(item=>{
    const p=menu.find(x=>x.id==item.prodId);
    const modsExtra=(item.mods||[]).reduce((s,mo)=>s+mo.precio,0);
    const ventaId='v_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
    ventaIds.push(ventaId);
    const rec=recetas[item.prodId]||[];
    rec.forEach(r=>{ const ins=insumos.find(x=>x.id===r.insumoId); if(ins) ins.stock=Math.max(0,(ins.stock||0)-r.cantidad*item.qty); });
    return {id:ventaId,fecha,hora,timestamp:ts,operador,mesa:m?m.nombre:'',tipo:m?m.tipo:'salon',
      producto:p?p.name:'?',modificadores:(item.mods||[]).map(mo=>mo.nombre).join(', '),
      nota:item.nota||'',categoria:getCat(p?.cat).name,seccion:getCat(p?.cat).seccion,
      cantidad:item.qty,precioBase:item.precio,precioMods:modsExtra,total:(item.precio+modsExtra)*item.qty,pago,cat:p?.cat};
  });
  ventas.push(...nuevas);
  if(turno&&turno.abierto) turno.ventasIds=[...(turno.ventasIds||[]),...ventaIds];
  mesas=mesas.filter(x=>x.id!==mesaActivaId); save();
  const ok=await syncVentasSheets(nuevas); syncStockSheets();
  showToast(ok?'✓ Venta guardada en Sheets':(config.webappUrl?'✓ Venta registrada (sin internet)':'✓ Venta registrada'));
  btn.disabled=false; btn.textContent='Cerrar y cobrar'; renderMesas();
}

function renderProdGrid(){
  const el=$('prod-grid'); if(!el) return;
  const list=catCarga==='todos'?menu:menu.filter(p=>p.cat===catCarga);
  if(!list.length){ el.innerHTML='<div class="empty">No hay productos</div>'; return; }
  const qtyMap={};
  Object.values(carrito).forEach(item=>{ qtyMap[item.prodId]=(qtyMap[item.prodId]||0)+item.qty; });
  el.innerHTML=list.map(p=>{
    const qty=qtyMap[p.id]||0; const cat=getCat(p.cat);
    const hasMods=(p.modificadores||[]).length>0;
    return `<div class="prod-card${qty>0?' in-cart':''}" onclick="addItem(${p.id})">
      <div class="cat-dot" style="background:${cat.color}"></div>
      <div class="prod-name">${p.name}</div>
      <div class="prod-price">${fmt(p.price)}</div>
      ${hasMods?`<div class="prod-mods-hint">🔧 Personalizable</div>`:''}
      ${qty>0?`<div class="prod-badge">${qty}</div>`:''}
    </div>`;
  }).join('');
}

function addItem(id){
  const p=menu.find(x=>x.id===id); if(!p) return;
  if((p.modificadores||[]).length>0){ abrirModalMods(p); }
  else {
    const key=`${id}_plain`;
    carrito[key] ? carrito[key].qty++ : (carrito[key]={prodId:id,qty:1,mods:[],nota:'',precio:p.price});
    saveMesaCarrito(); renderProdGrid(); renderCart();
  }
}
function changeQty(key,d){
  if(!carrito[key]) return; carrito[key].qty+=d;
  if(carrito[key].qty<=0) delete carrito[key];
  saveMesaCarrito(); renderProdGrid(); renderCart();
}
function renderCart(){
  const items=Object.entries(carrito);
  const ct=$('cart-total'),ce=$('cart-empty'),cr=$('cart-rows'),bc=$('btn-confirm');
  if(!ct) return;
  if(!items.length){ ce.style.display='block'; cr.style.display='none'; ct.textContent='$0'; if(bc) bc.disabled=true; return; }
  if(bc) bc.disabled=false; ce.style.display='none'; cr.style.display='flex';
  cr.innerHTML=items.map(([key,item])=>{
    const p=menu.find(x=>x.id==item.prodId); if(!p) return '';
    const modsExtra=(item.mods||[]).reduce((s,m)=>s+m.precio,0);
    const sub=(item.precio+modsExtra)*item.qty;
    const modsStr=(item.mods||[]).map(m=>m.nombre+(m.precio?` +${fmt(m.precio)}`:'')  ).join(' · ');
    return `<div class="cart-row">
      <div class="c-name-wrap">
        <div class="c-name">${p.name}</div>
        ${modsStr?`<div class="c-mods">${modsStr}</div>`:''}
        ${item.nota?`<div class="c-nota">${item.nota}</div>`:''}
      </div>
      <div class="qty-wrap">
        <button class="qty-btn" onclick="changeQty('${key}',-1)">−</button>
        <span class="qty-n">${item.qty}</span>
        <button class="qty-btn" onclick="changeQty('${key}',1)">+</button>
      </div>
      <span class="c-sub">${fmt(sub)}</span>
    </div>`;
  }).join('');
  ct.textContent=fmt(carritoTotal());
}
function setPago(t){
  pago=t;
  if(mesaActivaId){ const m=mesas.find(x=>x.id===mesaActivaId); if(m){ m.pago=t; save(); } }
  $('popt-ef').className='pago-opt'+(t==='ef'?' active':'');
  $('popt-mp').className='pago-opt'+(t==='mp'?' active':'');
}

// ── Modal modificadores (al cargar) ──
function abrirModalMods(p){
  prodParaMods=p; modsSeleccionados={};
  $('modal-mods-titulo').textContent=p.name; $('modal-mods-nota').value='';
  const el=$('modal-mods-grupos');
  el.innerHTML=(p.modificadores||[]).map((grupo,gi)=>`
    <div class="mod-sel-grupo">
      <div class="mod-sel-titulo">${grupo.grupo} <span style="font-size:10px;color:var(--ink3)">${grupo.tipo==='unico'?'(elegí uno)':'(varios)'}</span></div>
      <div class="mod-sel-opciones">${(grupo.opciones||[]).map((op,oi)=>`
        <div class="mod-sel-opt" id="mop-${gi}-${oi}" onclick="toggleMod(${gi},${oi},'${grupo.tipo}')">
          <span class="mod-sel-opt-nombre">${op.nombre}</span>
          <span class="mod-sel-opt-precio">${op.precio>0?`+${fmt(op.precio)}`:'sin cargo'}</span>
        </div>`).join('')}
      </div>
    </div>`).join('');
  actualizarTotalMods(); $('modal-mods').classList.add('open');
}
function cerrarModalMods(){ $('modal-mods').classList.remove('open'); prodParaMods=null; }
function closeModalMods(e){ if(e.target===$('modal-mods')) cerrarModalMods(); }
function toggleMod(gi,oi,tipo){
  const grupo=(prodParaMods.modificadores||[])[gi]; if(!grupo) return;
  const op=grupo.opciones[oi];
  if(!modsSeleccionados[gi]) modsSeleccionados[gi]=[];
  if(tipo==='unico'){
    grupo.opciones.forEach((_,x)=>document.getElementById(`mop-${gi}-${x}`)?.classList.remove('sel'));
    modsSeleccionados[gi]=[{nombre:op.nombre,precio:op.precio||0}];
    document.getElementById(`mop-${gi}-${oi}`)?.classList.add('sel');
  } else {
    const el=document.getElementById(`mop-${gi}-${oi}`);
    const idx=modsSeleccionados[gi].findIndex(x=>x.nombre===op.nombre);
    if(idx>=0){ modsSeleccionados[gi].splice(idx,1); el?.classList.remove('sel'); }
    else { modsSeleccionados[gi].push({nombre:op.nombre,precio:op.precio||0}); el?.classList.add('sel'); }
  }
  actualizarTotalMods();
}
function actualizarTotalMods(){
  if(!prodParaMods) return;
  const extra=Object.values(modsSeleccionados).flat().reduce((s,m)=>s+m.precio,0);
  $('modal-mods-total').textContent=fmt(prodParaMods.price+extra);
}
function confirmarMods(){
  if(!prodParaMods) return;
  const mods=Object.values(modsSeleccionados).flat();
  const nota=$('modal-mods-nota').value.trim();
  const key=`${prodParaMods.id}_${mods.map(m=>m.nombre).sort().join(',')}_${Date.now()}`;
  carrito[key]={prodId:prodParaMods.id,qty:1,mods,nota,precio:prodParaMods.price};
  cerrarModalMods(); saveMesaCarrito(); renderProdGrid(); renderCart();
}

function renderDashboard(){
  const hoy=today();
  const vh=ventas.filter(v=>v.fecha===hoy);
  const totalHoy=vh.reduce((s,v)=>s+v.total,0);
  const txHoy=vh.length, prom=txHoy?Math.round(totalHoy/txHoy):0;
  const ayer=new Date(); ayer.setDate(ayer.getDate()-1);
  const va=ventas.filter(v=>v.fecha===ayer.toISOString().split('T')[0]);
  const totalAyer=va.reduce((s,v)=>s+v.total,0);
  const difPct=totalAyer>0?Math.round((totalHoy-totalAyer)/totalAyer*100):null;
  $('kpi-grid').innerHTML=`
    <div class="kpi"><div class="kpi-lbl">Venta hoy</div><div class="kpi-val">${fmt(totalHoy)}</div><div class="kpi-sub ${difPct!==null?(difPct>=0?'kpi-up':'kpi-dn'):''}">${difPct!==null?(difPct>=0?'+':'')+difPct+'%':'-'} vs ayer</div></div>
    <div class="kpi"><div class="kpi-lbl">Transacciones</div><div class="kpi-val">${txHoy}</div><div class="kpi-sub">prom. ${fmt(prom)}</div></div>
    <div class="kpi"><div class="kpi-lbl">Mesas hoy</div><div class="kpi-val">${new Set(vh.map(v=>v.mesa)).size}</div><div class="kpi-sub">${new Set(vh.filter(v=>v.tipo==='delivery').map(v=>v.mesa)).size} delivery</div></div>
    <div class="kpi"><div class="kpi-lbl">Clientes</div><div class="kpi-val">${clientes.length}</div><div class="kpi-sub">${reservas.filter(r=>r.fecha===hoy).length} reservas hoy</div></div>`;
  const cafe=vh.filter(v=>v.seccion==='cafeteria').reduce((s,v)=>s+v.total,0);
  const cocina=vh.filter(v=>v.seccion==='cocina').reduce((s,v)=>s+v.total,0);
  $('seccion-split').innerHTML=`
    <div class="seccion-card"><div class="seccion-lbl">☕ Cafetería</div><div class="seccion-val">${fmt(cafe)}</div><div class="seccion-sub">${vh.filter(v=>v.seccion==='cafeteria').length} ítems</div></div>
    <div class="seccion-card"><div class="seccion-lbl">🍳 Cocina</div><div class="seccion-val">${fmt(cocina)}</div><div class="seccion-sub">${vh.filter(v=>v.seccion==='cocina').length} ítems</div></div>`;
  // Bar 7 días
  const dias7=[]; const lbls7=[];
  for(let i=6;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-i); dias7.push(d.toISOString().split('T')[0]); lbls7.push(i===0?'Hoy':['D','L','M','X','J','V','S'][d.getDay()]); }
  const sem=dias7.map(f=>ventas.filter(v=>v.fecha===f).reduce((s,v)=>s+v.total,0));
  const maxV=Math.max(...sem,1);
  $('bar-semana').innerHTML=sem.map((v,i)=>`<div class="bar-col" style="gap:3px">
    ${v>0?`<span class="bar-monto">${fmtK(v)}</span>`:'<span class="bar-monto"></span>'}
    <div class="bar-fill${i===6?' today':v===maxV&&v>0?' hi':''}" style="height:${Math.round(v/maxV*60)}px"></div>
    <span class="bar-lbl">${lbls7[i]}</span></div>`).join('');
  // Top productos
  const conteo={};
  vh.forEach(v=>{conteo[v.producto]=(conteo[v.producto]||0)+v.cantidad});
  const top=Object.entries(conteo).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([n,c])=>({n,c}));
  const maxC=top[0]?.c||1;
  $('top-list').innerHTML=top.length?top.map((t,i)=>`<div class="top-row"><span class="top-rank">${i+1}</span><span class="top-name">${t.n}</span>
    <div class="top-bar-bg"><div class="top-bar-fill" style="width:${Math.round(t.c/maxC*100)}%"></div></div>
    <span class="top-cnt">${t.c} ud.</span></div>`).join(''):'<div style="font-size:12px;color:var(--ink3);text-align:center;padding:16px">Sin ventas hoy</div>';
  // Ef vs MP
  const ef=vh.filter(v=>v.pago==='ef').reduce((s,v)=>s+v.total,0);
  const mp=vh.filter(v=>v.pago==='mp').reduce((s,v)=>s+v.total,0);
  const tot2=ef+mp||1, pE=Math.round(ef/tot2*100);
  $('split-track').innerHTML=`<div class="split-ef" style="width:${pE}%"></div><div class="split-mp" style="width:${100-pE}%"></div>`;
  $('split-stats').innerHTML=`
    <div class="split-stat"><div class="split-lbl"><span class="sdot" style="background:var(--orange)"></span>Efectivo</div><div class="split-pct">${pE}%</div><div class="split-monto">${fmt(ef)}</div></div>
    <div class="split-stat"><div class="split-lbl"><span class="sdot" style="background:var(--orange-mid)"></span>Mercado Pago</div><div class="split-pct">${100-pE}%</div><div class="split-monto">${fmt(mp)}</div></div>`;
  // Cat
  const catRev={}; vh.forEach(v=>{catRev[v.cat]=(catRev[v.cat]||0)+v.total});
  const catData=Object.entries(catRev).sort((a,b)=>b[1]-a[1]).map(([c,t])=>({cat:c,t}));
  const maxT=catData[0]?.t||1;
  $('cat-rev').innerHTML=catData.length?catData.map(d=>{ const c=getCat(d.cat); return `<div class="cat-rev-row"><div class="cdot2" style="background:${c.color}"></div><span class="cat-rev-name">${c.name}</span>
    <div class="cat-bar-bg"><div class="cat-bar-fill" style="width:${Math.round(d.t/maxT*100)}%;background:${c.color}"></div></div>
    <span class="cat-rev-monto">${fmt(d.t)}</span></div>`; }).join(''):'<div style="font-size:12px;color:var(--ink3);text-align:center;padding:16px">Sin ventas hoy</div>';
  // Ingeniería de menú
  const hace30=new Date(); hace30.setDate(hace30.getDate()-30);
  const v30=ventas.filter(v=>v.fecha>=hace30.toISOString().split('T')[0]);
  const prodStats={};
  v30.forEach(v=>{if(!prodStats[v.producto])prodStats[v.producto]={nombre:v.producto,qty:0,rev:0,cat:v.cat};prodStats[v.producto].qty+=v.cantidad;prodStats[v.producto].rev+=v.total;});
  const vals=Object.values(prodStats);
  const avgQty=vals.reduce((s,p)=>s+p.qty,0)/(vals.length||1);
  const costoFn=p=>{ const mi=menu.find(m=>m.name===p.nombre); const rc=mi?recetas[mi.id]||[]:[];
    return rc.reduce((s,r)=>{ const ins=getInsumo(r.insumoId); return s+(ins?ins.costoUnitario*r.cantidad:0); },0); };
  const margenFn=p=>{ const c=costoFn(p); return p.qty>0?(p.rev-c*p.qty)/p.qty:0; };
  const avgMargen=vals.reduce((s,p)=>s+margenFn(p),0)/(vals.length||1);
  const quads={estrellas:[],caballos:[],rompecabezas:[],perros:[]};
  vals.forEach(p=>{ const hi=p.qty>=avgQty, hm=margenFn(p)>=avgMargen;
    const q=hi&&hm?'estrellas':hi?'caballos':hm?'rompecabezas':'perros';
    quads[q].push({n:p.nombre,qty:p.qty}); });
  const quadDef=[
    {key:'estrellas',   emoji:'⭐',label:'Estrellas',      bg:'var(--green-bg)'},
    {key:'caballos',    emoji:'🐴',label:'Caballos',       bg:'var(--blue-bg)'},
    {key:'rompecabezas',emoji:'🧩',label:'Rompecabezas',  bg:'var(--amber-bg)'},
    {key:'perros',      emoji:'🐶',label:'Perros',         bg:'var(--red-bg)'},
  ];
  $('menu-eng-grid').innerHTML=quadDef.map(q=>`<div class="menu-eng-quad" style="background:${q.bg};border-color:transparent">
    <div class="quad-titulo">${q.emoji} ${q.label}</div>
    ${quads[q.key].length?quads[q.key].slice(0,5).map(item=>`<div class="quad-item"><span>${item.n}</span><span>${item.qty}ud</span></div>`).join(''):
      '<div style="font-size:11px;color:var(--ink3)">Sin datos</div>'}
  </div>`).join('');
}

function renderHistorial(){
  const byF={};
  ventas.forEach(v=>{if(!byF[v.fecha])byF[v.fecha]=[];byF[v.fecha].push(v);});
  const entries=Object.entries(byF).sort((a,b)=>b[0].localeCompare(a[0]));
  if(!entries.length){ $('hist-list').innerHTML='<div class="empty">No hay ventas registradas</div>'; return; }
  $('hist-list').innerHTML=entries.map(([fecha,rows],i)=>{
    const total=rows.reduce((s,v)=>s+v.total,0);
    const ef=rows.filter(v=>v.pago==='ef').length, mp=rows.filter(v=>v.pago==='mp').length;
    const items={};
    rows.forEach(v=>{items[v.producto]=(items[v.producto]||0)+v.cantidad;});
    const d=new Date(fecha+'T12:00:00');
    return `<div class="hist-item">
      <div class="hist-hdr" onclick="toggleHist(${i})">
        <div><div class="hist-fecha">${fmtShort(d)}</div><div class="hist-meta">Ef. ${ef} · MP ${mp} · ${rows.length} ítems</div></div>
        <div class="hist-right"><span class="hist-total">${fmt(total)}</span><span class="hist-arr" id="ha-${i}">▾</span></div>
      </div>
      <div class="hist-detail" id="hd-${i}">
        ${Object.entries(items).map(([prod,qty])=>{ const sub=rows.filter(v=>v.producto===prod).reduce((s,v)=>s+(v.total||0),0);
          return `<div class="hist-row2"><span>${prod} ×${qty}</span><span>${fmt(sub)}</span></div>`;}).join('')}
      </div>
    </div>`;
  }).join('');
}
function toggleHist(i){ const d=$('hd-'+i),a=$('ha-'+i); const open=d.classList.toggle('open'); a.classList.toggle('open',open); }
