function renderInv(){
  const q=($('inv-search')?.value||'').toLowerCase();
  let items=insumos.filter(p=>!q||(p.nombre||'').toLowerCase().includes(q));
  const out=items.filter(p=>p.stock<=0), low=items.filter(p=>p.stock>0&&p.stock<=(p.alertaStock||0));
  $('inv-alerts').innerHTML=(out.length?`<div class="alert-banner crit">⛔ ${out.map(p=>p.nombre).join(', ')}</div>`:'')
    +(low.length?`<div class="alert-banner">⚠️ ${low.map(p=>`${p.nombre} (${p.stock}${p.unidad})`).join(', ')}</div>`:'');
  if(!items.length){ $('inv-table').innerHTML=insumos.length?'<div class="empty">Sin resultados</div>':'<div class="empty">No hay insumos. Creá el primero con + Insumo</div>'; return; }
  $('inv-table').innerHTML=items.map(ins=>{
    const st=ins.stock<=0?'out':ins.stock<=(ins.alertaStock||0)?'low':'ok';
    return `<div class="inv-row${st==='low'?' low':''}${st==='out'?' out':''}">
      <div class="inv-name"><span>${ins.nombre}</span><span class="inv-cat-tag">${ins.unidad}</span></div>
      <span class="inv-status ${st}">${st==='ok'?'✓ OK':st==='low'?'⚠ Bajo':'⛔ Agotado'}</span>
      <div class="stock-ctrl">
        <button class="qty-btn" onclick="adjInsumo('${ins.id}',-1)">−</button>
        <input class="stock-num" type="number" value="${ins.stock}" min="0" onchange="setInsumoStock('${ins.id}',this.value)" onblur="setInsumoStock('${ins.id}',this.value)">
        <button class="qty-btn" onclick="adjInsumo('${ins.id}',1)">+</button>
      </div>
      <div class="icon-btn" onclick="openInsumoModal('${ins.id}')">
        <svg viewBox="0 0 16 16" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 2l3 3L5 14H2v-3L11 2z"/></svg>
      </div>
    </div>`;
  }).join('');
}
function adjInsumo(id,d){ const ins=insumos.find(x=>x.id===id); if(!ins) return; ins.stock=Math.max(0,(ins.stock||0)+d); save(); renderInv(); renderStockAlerts(); syncStockSheets(); }
function setInsumoStock(id,val){ const ins=insumos.find(x=>x.id===id); if(!ins) return; ins.stock=Math.max(0,parseFloat(val)||0); save(); renderInv(); renderStockAlerts(); syncStockSheets(); }
function openInsumoModal(id){
  editInsumoId=id;
  if(id){ const ins=insumos.find(x=>x.id===id); if(!ins) return;
    $('insumo-modal-titulo').textContent='Editar insumo';
    $('ins-nombre').value=ins.nombre||''; $('ins-unidad').value=ins.unidad||'g';
    $('ins-costo').value=ins.costoUnitario||0; $('ins-stock').value=ins.stock||0; $('ins-alerta').value=ins.alertaStock||0;
    $('insumo-modal-actions').innerHTML=`<button class="btn-cancel" onclick="confirmarAccion('¿Eliminar este insumo?','eliminarInsumo_'+\`${id}\`)" style="color:var(--red);border-color:rgba(176,48,48,.3)">Eliminar</button><button class="btn-save" onclick="guardarInsumo()">Guardar</button>`;
  } else {
    $('insumo-modal-titulo').textContent='Nuevo insumo';
    ['ins-nombre','ins-costo','ins-stock','ins-alerta'].forEach(fid=>$(fid).value=''); $('ins-unidad').value='g';
    $('insumo-modal-actions').innerHTML=`<button class="btn-cancel" onclick="cerrarModalInsumo()">Cancelar</button><button class="btn-save" onclick="guardarInsumo()">Guardar</button>`;
  }
  $('modal-insumo').classList.add('open'); setTimeout(()=>$('ins-nombre').focus(),100);
}
function cerrarModalInsumo(){ $('modal-insumo').classList.remove('open'); }
function closeModalInsumo(e){ if(e.target===$('modal-insumo')) cerrarModalInsumo(); }
function guardarInsumo(){
  const nombre=$('ins-nombre').value.trim(); if(!nombre){ showToast('Ingresá el nombre'); return; }
  const data={nombre,unidad:$('ins-unidad').value,costoUnitario:parseFloat($('ins-costo').value)||0,stock:parseFloat($('ins-stock').value)||0,alertaStock:parseFloat($('ins-alerta').value)||0};
  if(editInsumoId){ Object.assign(insumos.find(x=>x.id===editInsumoId),data); }
  else { insumos.push({id:'ins_'+Date.now(),...data}); }
  save(); cerrarModalInsumo(); renderInv(); renderStockAlerts(); syncStockSheets();
  showToast(editInsumoId?'✓ Insumo actualizado':'✓ Insumo agregado');
}
function eliminarInsumo(id){
  if(typeof id === 'string' && id.startsWith('eliminarInsumo_')) id=id.replace('eliminarInsumo_','');
  insumos=insumos.filter(x=>x.id!==id);
  Object.keys(recetas).forEach(pid=>{ recetas[pid]=recetas[pid].filter(r=>r.insumoId!==id); });
  save(); cerrarModalInsumo(); renderInv(); renderStockAlerts(); syncStockSheets(); showToast('✓ Insumo eliminado');
}

// ── Mermas ──
function renderMermas(){
  const el=$('mermas-lista'); if(!el) return;
  if(!mermas.length){ el.innerHTML='<div class="empty">No hay mermas registradas</div>'; return; }
  el.innerHTML=[...mermas].reverse().map(m=>{
    const ins=getInsumo(m.insumoId);
    return `<div class="merma-row">
      <div class="merma-info"><div class="merma-nombre">${ins?ins.nombre:'Insumo eliminado'}</div>
        <div class="merma-meta">${m.motivo} · ${m.fecha}${m.nota?' · '+m.nota:''}</div></div>
      <div class="merma-cant">−${m.cantidad}${ins?ins.unidad:''}</div>
    </div>`;
  }).join('');
}
function openMermaModal(){
  if(!insumos.length){ showToast('No hay insumos cargados'); return; }
  $('merma-insumo').innerHTML=insumos.map(ins=>`<option value="${ins.id}">${ins.nombre} (${ins.stock}${ins.unidad})</option>`).join('');
  $('merma-cant').value=''; $('merma-nota').value=''; $('merma-motivo').value='vencimiento';
  $('modal-merma').classList.add('open');
}
function cerrarModalMerma(){ $('modal-merma').classList.remove('open'); }
function closeModalMerma(e){ if(e.target===$('modal-merma')) cerrarModalMerma(); }
function guardarMerma(){
  const insumoId=$('merma-insumo').value, cantidad=parseFloat($('merma-cant').value)||0;
  if(!insumoId||!cantidad){ showToast('Seleccioná insumo y cantidad'); return; }
  const ins=getInsumo(insumoId); ins.stock=Math.max(0,(ins.stock||0)-cantidad);
  mermas.push({id:'mrm_'+Date.now(),insumoId,cantidad,motivo:$('merma-motivo').value,nota:$('merma-nota').value.trim(),fecha:today(),hora:nowT()});
  save(); cerrarModalMerma(); renderInv(); renderStockAlerts(); renderMermas(); syncStockSheets(); showToast('✓ Merma registrada');
}

// ══════════════════════════════════════════════════
//  RESERVAS (de productos/porciones)
// ══════════════════════════════════════════════════
function renderReservaFiltroChips(){
  const tipos=['todos','salon','delivery','takeaway'];
  const el=$('reserva-filtro-chips'); if(!el) return;
  el.innerHTML=tipos.map(t=>`<div class="chip${reservaFiltroTipo===t?' active':''}" onclick="setReservaFiltro('${t}')">
    ${t==='todos'?'Todos':tipoLabel(t)}</div>`).join('');
}
function setReservaFiltro(t){ reservaFiltroTipo=t; renderReservaFiltroChips(); renderReservas(); }

function renderReservas(){
  renderReservaFiltroChips();
  let lista=reservaFiltroTipo==='todos'?reservas:reservas.filter(r=>r.tipo===reservaFiltroTipo);
  lista=[...lista].sort((a,b)=>{ const fe=a.estado==='cancelada'?1:0, fb=b.estado==='cancelada'?1:0; return fe-fb||(a.fecha||'').localeCompare(b.fecha||''); });
  const el=$('reservas-lista'); if(!el) return;
  if(!lista.length){ el.innerHTML='<div class="empty">No hay reservas</div>'; return; }
  el.innerHTML=lista.map(r=>{
    const prod=menu.find(p=>p.id==r.productoId);
    const estadoColors={pendiente:'var(--amber)',confirmada:'var(--green)',pagada:'var(--blue)',cancelada:'var(--ink3)'};
    return `<div class="reserva-card ${r.estado||'pendiente'}">
      <div style="flex-shrink:0">
        <span class="mesa-tipo-badge ${tipoBadgeClass(r.tipo||'salon')}">${tipoLabel(r.tipo||'salon')}</span>
      </div>
      <div class="reserva-info" style="flex:1;min-width:0">
        <div class="reserva-cliente">${r.nombre||'Sin nombre'}</div>
        ${prod?`<div class="reserva-prod">📦 ${prod.name} × ${r.porciones||1}</div>`:''}
        ${r.fecha?`<div class="reserva-porciones">📅 ${r.fecha}</div>`:''}
        ${r.nota?`<div class="reserva-nota">${r.nota}</div>`:''}
        <div class="reserva-actions">
          <button class="btn-sm" onclick="openReservaModal('${r.id}')">Editar</button>
          <button class="btn-sm" onclick="confirmarAccion('¿Eliminar esta reserva?',()=>eliminarReserva('${r.id}'))" style="color:var(--red);border-color:rgba(176,48,48,.2)">Eliminar</button>
        </div>
      </div>
      <span class="reserva-estado ${r.estado||'pendiente'}">${r.estado||'pendiente'}</span>
    </div>`;
  }).join('');
}

function popularMenuSelect(selId){
  const sel=$('res-producto'); if(!sel) return;
  sel.innerHTML=menu.map(p=>`<option value="${p.id}"${p.id==selId?' selected':''}>${p.name} — ${fmt(p.price)}</option>`).join('');
}

function openReservaModal(id){
  editReservaId=id; tipoNuevaMesaReserva='salon';
  popularMenuSelect(); popularClienteSelectReserva();
  ['salon','delivery','takeaway'].forEach(t=>{ $(`rtipo-btn-${t}`).className=`tipo-btn${t===tipoNuevaMesaReserva?' sel-'+t:''}`; });
  if(id){
    const r=reservas.find(x=>x.id===id); if(!r) return;
    $('reserva-modal-titulo').textContent='Editar reserva';
    tipoNuevaMesaReserva=r.tipo||'salon';
    ['salon','delivery','takeaway'].forEach(t=>{ $(`rtipo-btn-${t}`).className=`tipo-btn${t===tipoNuevaMesaReserva?' sel-'+t:''}`; });
    $('res-cliente').value=r.clienteId||''; $('res-nombre').value=r.nombre||'';
    $('res-fecha').value=r.fecha||''; $('res-estado').value=r.estado||'pendiente';
    $('res-nota').value=r.nota||''; $('res-porciones').value=r.porciones||1;
    popularMenuSelect(r.productoId);
    $('reserva-modal-actions').innerHTML=`<button class="btn-cancel" onclick="cerrarModalReserva()">Cancelar</button><button class="btn-save" onclick="guardarReserva()">Guardar</button>`;
  } else {
    $('reserva-modal-titulo').textContent='Nueva reserva';
    ['res-nombre','res-nota'].forEach(fid=>$(fid).value='');
    $('res-fecha').value=today(); $('res-estado').value='pendiente'; $('res-porciones').value=1; $('res-cliente').value='';
    $('reserva-modal-actions').innerHTML=`<button class="btn-cancel" onclick="cerrarModalReserva()">Cancelar</button><button class="btn-save" onclick="guardarReserva()">Guardar</button>`;
  }
  $('modal-reserva').classList.add('open');
}
function popularClienteSelectReserva(){
  const sel=$('res-cliente'); if(!sel) return;
  sel.innerHTML=`<option value="">Sin cliente</option>`+clientes.map(c=>`<option value="${c.id}">${c.nombre}</option>`).join('');
}
function selReservaTipo(t){ tipoNuevaMesaReserva=t; ['salon','delivery','takeaway'].forEach(x=>{ $(`rtipo-btn-${x}`).className=`tipo-btn${x===t?' sel-'+x:''}`; }); }
function cerrarModalReserva(){ $('modal-reserva').classList.remove('open'); }
function closeModalReserva(e){ if(e.target===$('modal-reserva')) cerrarModalReserva(); }
function guardarReserva(){
  const nombre=$('res-nombre').value.trim();
  if(!nombre){ showToast('Ingresá un nombre'); return; }
  const clienteId=$('res-cliente').value;
  const cli=clientes.find(c=>c.id===clienteId);
  const data={tipo:tipoNuevaMesaReserva,nombre,productoId:parseInt($('res-producto').value)||null,porciones:parseInt($('res-porciones').value)||1,fecha:$('res-fecha').value,estado:$('res-estado').value,nota:$('res-nota').value.trim(),clienteId,clienteNombre:cli?cli.nombre:''};
  if(editReservaId){ Object.assign(reservas.find(x=>x.id===editReservaId),data); }
  else { reservas.push({id:'res_'+Date.now(),...data}); }
  save(); cerrarModalReserva(); renderReservas(); syncReservasSheets();
  showToast(editReservaId?'✓ Reserva actualizada':'✓ Reserva creada');
}
function eliminarReserva(id){
  reservas=reservas.filter(x=>x.id!==id); save(); renderReservas(); syncReservasSheets(); showToast('✓ Reserva eliminada');
}

// ══════════════════════════════════════════════════
//  CLIENTES (tab propia)
// ══════════════════════════════════════════════════
function renderClientesTab(){
  const el=$('clientes-lista-tab'); if(!el) return;
  const q=($('cliente-search')?.value||'').toLowerCase();
  const lista=clientes.filter(c=>!q||(c.nombre||'').toLowerCase().includes(q)||(c.telefono||'').includes(q));
  if(!lista.length){ el.innerHTML='<div class="empty">No hay clientes</div>'; return; }
  el.innerHTML=lista.map(c=>`<div class="cliente-row" onclick="openClienteModal('${c.id}')">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div class="cliente-nombre">${c.nombre}</div>
      <div class="cliente-visitas">${(c.visitas||[]).length} visitas</div>
    </div>
    <div class="cliente-meta">${[c.telefono,c.email,c.alergias?'⚠ '+c.alergias:''].filter(Boolean).join(' · ')}</div>
    ${c.preferencias?`<div style="font-size:11px;color:var(--blue);margin-top:3px">★ ${c.preferencias}</div>`:''}
  </div>`).join('');
}
function openClienteModal(id,retorno){
  editClienteId=id; clienteModalRetorno=retorno||null;
  if(id){ const c=clientes.find(x=>x.id===id); if(!c) return;
    $('cliente-modal-titulo').textContent='Editar cliente';
    $('cli-nombre').value=c.nombre||''; $('cli-tel').value=c.telefono||''; $('cli-email').value=c.email||''; $('cli-alergias').value=c.alergias||''; $('cli-prefs').value=c.preferencias||'';
    $('cliente-modal-actions').innerHTML=`<button class="btn-cancel" onclick="confirmarAccion('¿Eliminar a ${c.nombre}?',()=>eliminarCliente('${id}'))" style="color:var(--red);border-color:rgba(176,48,48,.3)">Eliminar</button><button class="btn-save" onclick="guardarCliente()">Guardar</button>`;
  } else {
    $('cliente-modal-titulo').textContent='Nuevo cliente';
    ['cli-nombre','cli-tel','cli-email','cli-alergias','cli-prefs'].forEach(fid=>$(fid).value='');
    $('cliente-modal-actions').innerHTML=`<button class="btn-cancel" onclick="cerrarModalCliente()">Cancelar</button><button class="btn-save" onclick="guardarCliente()">Guardar</button>`;
  }
  $('modal-cliente').classList.add('open'); setTimeout(()=>$('cli-nombre').focus(),100);
}
function cerrarModalCliente(){ $('modal-cliente').classList.remove('open'); clienteModalRetorno=null; }
function closeModalCliente(e){ if(e.target===$('modal-cliente')) cerrarModalCliente(); }
function eliminarCliente(id){ clientes=clientes.filter(x=>x.id!==id); save(); cerrarModalCliente(); renderClientesTab(); syncClientesSheets(); showToast('✓ Cliente eliminado'); }
function guardarCliente(){
  const nombre=$('cli-nombre').value.trim(); if(!nombre){ showToast('Ingresá el nombre'); return; }
  const data={nombre,telefono:$('cli-tel').value.trim(),email:$('cli-email').value.trim(),alergias:$('cli-alergias').value.trim(),preferencias:$('cli-prefs').value.trim()};
  if(editClienteId){ Object.assign(clientes.find(x=>x.id===editClienteId),data); }
  else { clientes.push({id:'cli_'+Date.now(),...data,visitas:[]}); }
  save(); cerrarModalCliente(); renderClientesTab(); syncClientesSheets();
  if(clienteModalRetorno==='reserva'){ popularClienteSelectReserva(); $('modal-reserva').classList.add('open'); }
  showToast(editClienteId?'✓ Cliente actualizado':'✓ Cliente agregado');
}

// ══════════════════════════════════════════════════
//  AJUSTES
// ══════════════════════════════════════════════════
function renderAjustes(){
  renderCatMgr(); renderMenuAdm(); renderRecetasAdm(); renderModsAdm();
  renderAjustesConfig(); renderSetupBanner();
  const am=$('acc-menu-meta');
  if(am) am.textContent=`${menu.length} productos · ${cats.length} categorías`;
}

// ── CATEGORÍAS ──
function renderCatMgr(){
  $('cat-mgr').innerHTML=cats.map((c,i)=>`
    <div>
      <div class="cat-mgr-row">
        <div class="cat-swatch" style="background:${c.color}" onclick="toggleCP(${i})"></div>
        <input class="cat-name-in" value="${c.name}" onchange="renameCat(${i},this.value)" onblur="renameCat(${i},this.value)">
        <select class="cat-seccion-sel" onchange="setSeccion(${i},this.value)">
          <option value="cafeteria"${c.seccion==='cafeteria'?' selected':''}>☕ Cafetería</option>
          <option value="cocina"${c.seccion==='cocina'?' selected':''}>🍳 Cocina</option>
        </select>
        <button class="cat-del" onclick="confirmarAccion('¿Eliminar categoría ${c.name}?',()=>deleteCat(${i}))">×</button>
      </div>
      <div class="color-picker-wrap" id="cp-${i}">
        <div class="color-dots">${PRESET_COLORS.map(col=>`<div class="cdot${c.color===col?' sel':''}" style="background:${col}" onclick="setCatColor(${i},'${col}')"></div>`).join('')}</div>
      </div>
    </div>`).join('');
}
function toggleCP(i){ document.querySelectorAll('.color-picker-wrap').forEach((el,j)=>{if(j!==i)el.classList.remove('open');}); document.getElementById('cp-'+i).classList.toggle('open'); }
function setCatColor(i,col){ cats[i].color=col; save(); renderCatMgr(); renderCargaCats(); document.getElementById('cp-'+i).classList.remove('open'); showToast('Color actualizado'); }
function renameCat(i,val){ const v=val.trim(); if(!v||cats[i].name===v) return; cats[i].name=v; save(); renderCargaCats(); populateCatSelect(); showToast('Categoría renombrada'); }
function setSeccion(i,val){ cats[i].seccion=val; save(); }
function deleteCat(i){ const c=cats[i]; if(menu.some(p=>p.cat===c.id)){ showToast(`No se puede eliminar — tiene productos`); return; } cats.splice(i,1); save(); renderCatMgr(); renderCargaCats(); showToast('Categoría eliminada'); }
function addCat(){ const id='cat_'+Date.now(); cats.push({id,name:'Nueva categoría',color:PRESET_COLORS[cats.length%PRESET_COLORS.length],seccion:'cafeteria'}); save(); renderCatMgr(); renderCargaCats(); setTimeout(()=>{ const ins=document.querySelectorAll('.cat-name-in'); const last=ins[ins.length-1]; if(last){last.focus();last.select();} },50); }
function addCatFromModal(){ const nombre=prompt('Nombre de la nueva categoría:',''); if(!nombre?.trim()) return; const id='cat_'+Date.now(); cats.push({id,name:nombre.trim(),color:PRESET_COLORS[cats.length%PRESET_COLORS.length],seccion:'cafeteria'}); save(); populateCatSelect(); $('m-cat').value=id; showToast(`✓ "${nombre.trim()}" creada`); }

// ── PRODUCTOS ──
function populateCatSelect(){ $('m-cat').innerHTML=cats.map(c=>`<option value="${c.id}">${c.name}</option>`).join(''); }
function renderMenuAdm(){
  $('menu-adm').innerHTML=menu.map(p=>{ const cat=getCat(p.cat); return `<div class="menu-adm-row">
    <div style="width:8px;height:8px;border-radius:50%;background:${cat.color};flex-shrink:0"></div>
    <span style="flex:1;font-size:13px">${p.name}</span>
    <span style="font-size:12px;color:var(--ink2)">${fmt(p.price)}</span>
    ${(p.modificadores||[]).length?`<span style="font-size:10px;color:var(--ink3)">${(p.modificadores||[]).length}g mods</span>`:''}
    <div class="icon-btn" onclick="openProdModal(${p.id})">
      <svg viewBox="0 0 16 16" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 2l3 3L5 14H2v-3L11 2z"/></svg>
    </div>
  </div>`; }).join('');
}
function openProdModal(id){
  editId=id; populateCatSelect();
  if(id){ const p=menu.find(x=>x.id===id); if(!p) return;
    $('prod-modal-title').textContent='Editar producto';
    $('m-nombre').value=p.name||''; $('m-precio').value=p.price; $('m-cat').value=p.cat;
    $('prod-modal-actions').innerHTML=`<button class="btn-cancel" onclick="confirmarAccion('¿Eliminar ${p.name}?',()=>eliminarProducto(${id}))" style="color:var(--red);border-color:rgba(176,48,48,.3)">Eliminar</button><button class="btn-save" onclick="guardarProducto()">Guardar</button>`;
  } else {
    $('prod-modal-title').textContent='Nuevo producto';
    ['m-nombre','m-precio'].forEach(fid=>$(fid).value=''); $('m-cat').value=cats[0]?.id||'';
    $('prod-modal-actions').innerHTML=`<button class="btn-cancel" onclick="closeProdModal()">Cancelar</button><button class="btn-save" onclick="guardarProducto()">Guardar</button>`;
  }
  $('modal-prod').classList.add('open'); setTimeout(()=>$('m-nombre').focus(),100);
}
function closeProdModal(){ $('modal-prod').classList.remove('open'); }
function closeProdModalOutside(e){ if(e.target===$('modal-prod')) closeProdModal(); }
function eliminarProducto(id){ const p=menu.find(x=>x.id===id); if(!p) return; menu=menu.filter(x=>x.id!==id); delete recetas[id]; save(); renderMenuAdm(); renderProdGrid(); renderRecetasAdm(); renderModsAdm(); syncMenuSheets(); closeProdModal(); showToast(`✓ "${p.name}" eliminado`); }
function guardarProducto(){
  const name=$('m-nombre').value.trim(), price=parseInt($('m-precio').value), cat=$('m-cat').value;
  if(!name||!price){ showToast('Completá nombre y precio'); return; }
  if(editId){ Object.assign(menu.find(x=>x.id===editId),{name,price,cat}); }
  else { menu.push({id:menu.reduce((m,p)=>Math.max(m,p.id),0)+1,name,price,cat,modificadores:[]}); }
  save(); renderMenuAdm(); renderProdGrid(); renderCargaCats(); renderRecetasAdm(); renderModsAdm(); syncMenuSheets(); closeProdModal(); showToast(editId?'✓ Actualizado':'✓ Agregado');
}

// ── RECETAS ──
function renderRecetasAdm(){
  const el=$('recetas-adm'); if(!el) return;
  el.innerHTML=menu.map(p=>{ const rec=recetas[p.id]||[];
    return `<div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-size:13px;font-weight:500">${p.name}</span>
        <button class="btn-sm" onclick="addRecetaLinea(${p.id})">+ Insumo</button>
      </div>
      <div id="receta-${p.id}">
        ${rec.map((r,ri)=>{ const ins=getInsumo(r.insumoId);
          return `<div class="receta-row">
            <select onchange="setRecetaInsumo(${p.id},${ri},this.value)">${insumos.map(i2=>`<option value="${i2.id}"${r.insumoId===i2.id?' selected':''}>${i2.nombre}</option>`).join('')}</select>
            <input type="number" value="${r.cantidad}" min="0" step="0.1" onchange="setRecetaCant(${p.id},${ri},this.value)">
            <span class="receta-unidad">${ins?ins.unidad:''}</span>
            <button class="qty-btn" onclick="delRecetaLinea(${p.id},${ri})">×</button>
          </div>`; }).join('')}
        ${!rec.length&&!insumos.length?`<div style="font-size:12px;color:var(--ink3)">Cargá insumos primero</div>`:''}
      </div>
      <div style="height:1px;background:var(--border);margin-top:10px"></div>
    </div>`;
  }).join('');
}
function addRecetaLinea(prodId){ if(!insumos.length){ showToast('Cargá insumos primero'); return; } if(!recetas[prodId])recetas[prodId]=[]; recetas[prodId].push({insumoId:insumos[0].id,cantidad:1}); save(); renderRecetasAdm(); }
function setRecetaInsumo(prodId,ri,val){ recetas[prodId][ri].insumoId=val; save(); renderRecetasAdm(); }
function setRecetaCant(prodId,ri,val){ recetas[prodId][ri].cantidad=parseFloat(val)||0; save(); }
function delRecetaLinea(prodId,ri){ recetas[prodId].splice(ri,1); save(); renderRecetasAdm(); }

// ── MODIFICADORES admin (modal) ──
function renderModsAdm(){
  const el=$('mods-adm'); if(!el) return;
  el.innerHTML=menu.map(p=>{ const mods=p.modificadores||[];
    return `<div class="menu-adm-row">
      <span style="flex:1;font-size:13px">${p.name}</span>
      <span style="font-size:11px;color:var(--ink3)">${mods.length?mods.length+' grupos':'Sin mods'}</span>
      <button class="btn-sm" onclick="openModsAdmin(${p.id})">Editar</button>
    </div>`;
  }).join('');
}

function openModsAdmin(prodId){
  modAdminProdId=prodId;
  const p=menu.find(x=>x.id===prodId); if(!p) return;
  modAdminGrupos=JSON.parse(JSON.stringify(p.modificadores||[]));
  $('mods-admin-titulo').textContent=`Modificadores — ${p.name}`;
  renderModAdminGrupos();
  $('modal-mods-admin').classList.add('open');
}
function cerrarModalModsAdmin(){ $('modal-mods-admin').classList.remove('open'); modAdminProdId=null; }
function closeModalModsAdmin(e){ if(e.target===$('modal-mods-admin')) cerrarModalModsAdmin(); }

function renderModAdminGrupos(){
  const el=$('mods-admin-grupos'); if(!el) return;
  el.innerHTML=modAdminGrupos.map((g,gi)=>`
    <div class="mod-grupo-admin">
      <div class="mod-grupo-admin-hdr">
        <input style="flex:1;padding:6px 10px;border:1px solid var(--border2);border-radius:var(--r-xs);font-family:var(--ff);font-size:13px;background:var(--surf);outline:none" value="${g.grupo}" placeholder="Nombre del grupo (ej: Leche)" oninput="modAdminGrupos[${gi}].grupo=this.value">
        <select class="mod-grupo-tipo" onchange="modAdminGrupos[${gi}].tipo=this.value">
          <option value="unico"${g.tipo==='unico'?' selected':''}>Único</option>
          <option value="multiple"${g.tipo==='multiple'?' selected':''}>Múltiple</option>
        </select>
        <button class="qty-btn" onclick="delGrupoMod(${gi})" style="flex-shrink:0">×</button>
      </div>
      ${(g.opciones||[]).map((op,oi)=>`
        <div class="mod-opcion-admin">
          <input class="mod-opcion-nombre" placeholder="Opción (ej: Almendras)" value="${op.nombre}" oninput="modAdminGrupos[${gi}].opciones[${oi}].nombre=this.value">
          <input class="mod-opcion-precio" type="number" min="0" placeholder="$0" value="${op.precio||0}" oninput="modAdminGrupos[${gi}].opciones[${oi}].precio=parseInt(this.value)||0">
          <button class="qty-btn" onclick="delOpcionMod(${gi},${oi})">×</button>
        </div>`).join('')}
      <button class="btn-sm" style="margin-top:6px;font-size:11px" onclick="addOpcionMod(${gi})">+ Opción</button>
    </div>`).join('');
}
function addGrupoMod(){ modAdminGrupos.push({grupo:'Nuevo grupo',tipo:'unico',opciones:[]}); renderModAdminGrupos(); }
function delGrupoMod(gi){ modAdminGrupos.splice(gi,1); renderModAdminGrupos(); }
function addOpcionMod(gi){ modAdminGrupos[gi].opciones.push({nombre:'',precio:0}); renderModAdminGrupos(); }
function delOpcionMod(gi,oi){ modAdminGrupos[gi].opciones.splice(oi,1); renderModAdminGrupos(); }
function guardarModsAdmin(){
  const p=menu.find(x=>x.id===modAdminProdId); if(!p) return;
  p.modificadores=modAdminGrupos.filter(g=>g.grupo.trim());
  save(); cerrarModalModsAdmin(); renderModsAdm(); renderMenuAdm(); showToast('✓ Modificadores guardados');
}

// ── CONFIG ──
function renderAjustesConfig(){
  if($('cfg-sheet-adj')&&config.sheetId) $('cfg-sheet-adj').value=config.sheetId;
  if($('cfg-url-adj')&&config.webappUrl) $('cfg-url-adj').value=config.webappUrl;
}

// ══════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════
renderSetupBanner();
renderStockAlerts();
renderTurnoPill();
renderMesas();

</script>
